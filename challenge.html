<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Final Challenge</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

font-family:Georgia,serif;

background:
linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.35)),
url("magic-room.png");

background-size:cover;
background-position:center;

color:white;

}

h1{

font-size:55px;
margin-bottom:15px;
text-shadow:0 0 15px violet;

}

p{

font-size:24px;
margin-bottom:35px;

}

#ball{

font-size:170px;

cursor:pointer;

transition:.3s;

filter:drop-shadow(0 0 20px #9f6cff);

user-select:none;

}

#ball:hover{

transform:scale(1.08);

}

#count{

margin-top:25px;

font-size:28px;

}

#message{

margin-top:20px;

font-size:26px;

height:35px;

color:#ffe97d;

}

button{

display:none;

margin-top:35px;

padding:18px 45px;

font-size:22px;

border:none;

border-radius:50px;

background:#ffd84d;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.08);

}

.sparkle{

animation:flash .5s;

}

@keyframes flash{

0%{

transform:scale(1);

}

50%{

transform:scale(1.2);

filter:drop-shadow(0 0 50px violet);

}

100%{

transform:scale(1);

}

}

</style>

</head>

<body>

<h1>✨ One Last Spell ✨</h1>

<p>cast one last spell to reveal your final gift...</p>

<div id="ball">🔮</div>

<div id="count">0 / 5</div>

<div id="message"></div>

<button onclick="location.href='message.html'">
💌 Open My Final Letter
</button>

<script>

let taps=0;

const ball=document.getElementById("ball");
const count=document.getElementById("count");
const message=document.getElementById("message");
const button=document.querySelector("button");

const texts=[

"The magic is waking up...",

"The crystal is glowing...",

"Almost there...",

"One last touch...",

"✨ The spell is complete! ✨"

];

ball.onclick=function(){

if(taps>=5)return;

taps++;

count.innerHTML=taps+" / 5";

message.innerHTML=texts[taps-1];

ball.classList.remove("sparkle");

void ball.offsetWidth;

ball.classList.add("sparkle");

ball.style.transform="scale("+(1+taps*0.05)+")";

if(taps==5){

message.innerHTML="✨ The spell is complete... ✨";

setTimeout(function(){

button.style.display="inline-block";

},1000);

}

}

</script>

</body>

</html>
